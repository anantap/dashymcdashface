<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashy McDashface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #16140f;
  --bg2: #1e1b15;
  --surface: #232019;
  --border: #2e2a22;
  --text: #f0ece6;
  --text-muted: #9a9288;
  --text-dim: #5a5650;
  --accent: #e05545;
  --mono: 'DM Mono', monospace;
  --r: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1.55;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── LAYOUT ── */
.page { position: relative; z-index: 1; width: 100%; max-width: 1280px; padding: 32px 24px; }

/* ── MASTHEAD ── */
.masthead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 12px;
  border-bottom: 2px solid var(--text);
  margin-bottom: 20px;
}

.masthead-date {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.masthead-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

/* ── CLOCK ── */
.clock {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}

.btn-small {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 8px;
  cursor: pointer;
  border-radius: var(--r);
  transition: all 0.15s;
}
.btn-small:hover { border-color: var(--text); color: var(--text); }

/* ── QUICKLINKS ── */
.quicklinks-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.quicklink-pill {
  position: relative;
  display: inline-block;
}

.quicklink-pill a {
  display: inline-block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 14px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.quicklink-pill a:hover { color: var(--text); border-color: var(--text-muted); }

.item-delete {
  display: block;
  position: absolute;
  top: -6px;
  right: -6px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 10px;
  line-height: 16px;
  text-align: center;
  cursor: pointer;
  padding: 0;
  font-family: var(--mono);
  z-index: 2;
}
/* ── EDIT FORMS ── */
.edit-form {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 10px;
}

.edit-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 5px 10px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.edit-input:focus { border-color: var(--text-muted); }
.edit-input::placeholder { color: var(--text-dim); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: stretch;
  margin-bottom: 20px;
}

.col-left, .col-right {
  display: flex;
  flex-direction: column;
}

.col-left .section, .col-right .section {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.col-left #jona-schedule, .col-right .weather-block {
  flex: 1;
}

#jona-schedule {
  display: flex;
  flex-direction: column;
  padding: 0;
}
.jona-row {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 12px;
  border-top: 1px solid var(--border);
}
.jona-row:first-child { border-top: none; }

/* ── SECTION ── */
.section { margin-bottom: 20px; }

.section-head {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}

.card-label {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.card-value {
  font-family: var(--mono);
  font-size: 25px;
  font-weight: 400;
  color: var(--text);
}

.card-sub {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ── WEATHER ── */
.weather-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 14px 0;
  display: flex;
  flex-direction: column;
}
.weather-block-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
}
.weather-block-temp {
  font-family: var(--mono);
  font-size: 25px;
  font-weight: 400;
  color: var(--text);
  line-height: 1;
}
.weather-block-condition {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-muted);
}
#weather-detail {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.weather-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex: 1;
  border-top: 1px solid var(--border);
  padding: 10px 0;
}
.weather-row-label { font-size: 15px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.weather-row-val { font-family: var(--mono); font-size: 15px; font-weight: 400; text-align: right; }


/* ── SKELETON ── */
.skel {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 3px;
  height: 11px;
  margin: 7px 0;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── ANIMATIONS ── */
.fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }

.section { animation: fadeIn 0.5s ease forwards; opacity: 0; }
.section:nth-child(1) { animation-delay: 0.05s; }
.section:nth-child(2) { animation-delay: 0.1s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:nth-child(4) { animation-delay: 0.2s; }

/* ── CAROUSEL ── */
.carousel-wrap {
  overflow: hidden;
}
.carousel-track {
  display: flex;
  transition: transform 0.35s ease;
}
.carousel-page {
  min-width: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  align-items: start;
}
.carousel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
}
.carousel-source {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.carousel-card a {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  text-decoration: none;
  line-height: 1.4;
  display: block;
}
.carousel-card a:hover { color: var(--text-muted); }
.carousel-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.carousel-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 14px;
  padding: 1px 7px;
  border-radius: var(--r);
  transition: all 0.15s;
  line-height: 1.4;
}
.carousel-btn:hover:not(:disabled) { border-color: var(--text); color: var(--text); }
.carousel-btn:disabled { opacity: 0.25; cursor: default; }
.carousel-pos {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 36px;
  text-align: center;
}
.feed-delete {
  display: inline;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  padding: 0;
  transition: color 0.15s;
  line-height: 1;
}
.feed-delete:hover { color: var(--accent); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .carousel-page { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .page { padding: 0 16px 32px; }
  .masthead { padding: 14px 0 10px; }
  .clock { font-size: 22px; }
  .grid { grid-template-columns: 1fr; }
  .carousel-page { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page">

  <!-- MASTHEAD -->
  <div class="masthead fade-in">
    <div class="masthead-date" id="date-str"></div>
    <div class="masthead-right">
      <div class="clock" id="clock"></div>
    </div>
  </div>

  <!-- QUICKLINKS ROW -->
  <div class="quicklinks-row" id="quicklinks-row">
    <div id="quicklinks-list" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;"></div>
    <div class="edit-form" id="quicklinks-form">
      <input class="edit-input" id="ql-name" placeholder="Naam" style="width:120px">
      <input class="edit-input" id="ql-url" placeholder="URL" style="width:200px">
      <button class="btn-small" onclick="addQuicklink()">Voeg toe</button>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid">

    <!-- LEFT COL -->
    <div class="col-left">
      <!-- Jona -->
      <div class="section">
        <div class="section-head">Jona</div>
        <div id="jona-schedule" class="card">
          <div class="card-label">Vandaag</div>
          <div class="card-value">—</div>
        </div>
      </div>

    </div>

    <!-- RIGHT COL: Weather -->
    <div class="col-right">
      <div class="section">
        <div class="section-head">Weer</div>
        <div class="weather-block">
          <div class="weather-block-header">
            <span class="weather-block-temp" id="weather-temp-block">—</span>
            <span class="weather-block-condition" id="weather-condition"> — </span>
          </div>
          <div id="weather-detail"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
        </div>
      </div>
    </div>

  </div><!-- /grid -->

  <!-- CAROUSEL -->
  <div>
    <div class="section-head" style="margin-bottom:12px;">
      <span>Feeds</span>
      <div class="carousel-nav">
        <button class="carousel-btn" id="carousel-prev" onclick="carouselNav(-1)">←</button>
        <span class="carousel-pos" id="carousel-pos"></span>
        <button class="carousel-btn" id="carousel-next" onclick="carouselNav(1)">→</button>
      </div>
    </div>
    <div class="carousel-wrap">
      <div class="carousel-track" id="carousel-track"></div>
    </div>
    <div class="edit-form" id="rss-form" style="margin-top:12px;">
      <input class="edit-input" id="rss-name" placeholder="Feed naam" style="width:120px">
      <input class="edit-input" id="rss-url" placeholder="Feed URL" style="width:220px">
      <button class="btn-small" onclick="addFeed()">+ RSS</button>
      <label class="btn-small" style="cursor:pointer;">OPML<input type="file" accept=".opml,.xml" style="display:none" onchange="importOpml(event)"></label>
      <input class="edit-input" id="reddit-sub" placeholder="Subreddit" style="width:140px; margin-left:8px;">
      <button class="btn-small" onclick="addSubreddit()">+ Reddit</button>
    </div>
  </div>

</div><!-- /page -->

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════════════════════
function startClock() {
  const days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

  function tick() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
    document.getElementById('date-str').textContent =
      `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════════
//  WEATHER — Open-Meteo (no API key)
// ══════════════════════════════════════════════════════
const WMO_CODES = {
  0:'Helder',1:'Overwegend helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',
  45:'Mist',48:'Rijpmist',51:'Lichte motregen',53:'Motregen',55:'Zware motregen',
  61:'Lichte regen',63:'Regen',65:'Zware regen',71:'Lichte sneeuw',73:'Sneeuw',80:'Regenbuien',81:'Buien',95:'Onweer'
};

async function loadWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude=52.0705&longitude=4.3007' +
      '&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m' +
      '&hourly=temperature_2m,precipitation_probability,precipitation' +
      '&forecast_days=1&timezone=Europe/Amsterdam';

    const resp = await fetch(url);
    const d = await resp.json();
    const c = d.current;
    const code = c.weathercode;

    document.getElementById('weather-temp-block').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-condition').textContent = WMO_CODES[code] || '';

    const maxTemp = Math.max(...d.hourly.temperature_2m.slice(0,24));
    const minTemp = Math.min(...d.hourly.temperature_2m.slice(0,24));

    const hourIdx = new Date().getHours();
    const precip = d.hourly.precipitation || [];
    const precipNext = (precip[hourIdx] || 0) + (precip[hourIdx + 1] || 0);
    const precipStr = precipNext === 0 ? 'Droog' : '~' + precipNext.toFixed(1) + 'mm';

    document.getElementById('weather-detail').innerHTML = `
      <div class="weather-row"><span class="weather-row-label">Min / Max</span><span class="weather-row-val">${Math.round(minTemp)}° / ${Math.round(maxTemp)}°</span></div>
      <div class="weather-row"><span class="weather-row-label">Wind</span><span class="weather-row-val">${Math.round(c.windspeed_10m)} km/u</span></div>
      <div class="weather-row"><span class="weather-row-label">Luchtvochtigheid</span><span class="weather-row-val">${c.relativehumidity_2m}%</span></div>
      <div class="weather-row"><span class="weather-row-label">Regen komend uur</span><span class="weather-row-val">${precipStr}</span></div>
    `;

  } catch(e) {
    document.getElementById('weather-detail').innerHTML = '<div style="font-size:14px;color:var(--text-dim);padding:10px 0">Weer niet beschikbaar</div>';
  }
}

// ══════════════════════════════════════════════════════
//  JONA SCHEDULE
// ══════════════════════════════════════════════════════
function loadJonaSchedule() {
  const schedule = {
    0: 'Papadag',
    1: 'Papadag',
    2: 'Opa & Omadag',
    3: 'Mamadag',
    4: 'Crèche',
    5: 'Crèche',
    6: 'Papadag'
  };
  const today = new Date().getDay();
  const tomorrow = (today + 1) % 7;
  const el = document.getElementById('jona-schedule');
  el.innerHTML = `
    <div class="jona-row">
      <div class="card-label">Vandaag</div>
      <div class="card-value">${schedule[today]}</div>
    </div>
    <div class="jona-row">
      <div class="card-label">Morgen</div>
      <div class="card-value">${schedule[tomorrow]}</div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════
//  LOCAL STORAGE HELPERS
// ══════════════════════════════════════════════════════
function lsGet(key, fallback) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch(e) {
    return fallback;
  }
}

function lsSet(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  QUICKLINKS
// ══════════════════════════════════════════════════════
function getQuicklinks() {
  return lsGet('dmdf-quicklinks', []);
}

function saveQuicklinks(links) {
  lsSet('dmdf-quicklinks', links);
}

function renderQuicklinks() {
  const links = getQuicklinks();
  const list = document.getElementById('quicklinks-list');
  list.innerHTML = '';

  links.forEach((link, i) => {
    const pill = document.createElement('div');
    pill.className = 'quicklink-pill';

    const a = document.createElement('a');
    a.href = /^https?:\/\//i.test(link.url) ? link.url : 'https://' + link.url;
    a.textContent = link.name;

    const delBtn = document.createElement('button');
    delBtn.className = 'item-delete';
    delBtn.textContent = '✕';
    delBtn.title = 'Verwijder';
    delBtn.onclick = () => deleteQuicklink(i);

    pill.appendChild(a);
    pill.appendChild(delBtn);
    list.appendChild(pill);
  });

  updateQuicklinksVisibility();
}

function updateQuicklinksVisibility() {
  // quicklinks row is always visible
}

function addQuicklink() {
  const nameEl = document.getElementById('ql-name');
  const urlEl  = document.getElementById('ql-url');
  const name = nameEl.value.trim();
  const url  = urlEl.value.trim();
  if (!name || !url) return;

  const links = getQuicklinks();
  links.push({ name, url });
  saveQuicklinks(links);
  nameEl.value = '';
  urlEl.value = '';
  renderQuicklinks();
}

function deleteQuicklink(idx) {
  const links = getQuicklinks();
  links.splice(idx, 1);
  saveQuicklinks(links);
  renderQuicklinks();
}

// ══════════════════════════════════════════════════════
//  RSS FEEDS
// ══════════════════════════════════════════════════════
function getFeeds() {
  return lsGet('dmdf-rss-feeds', []);
}

function saveFeeds(feeds) {
  lsSet('dmdf-rss-feeds', feeds);
}

async function fetchFeed(feed) {
  const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feed.url);
  const resp = await fetch(proxyUrl);
  const text = await resp.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'text/xml');
  const items = Array.from(xml.querySelectorAll('item')).slice(0, 5);

  return items.map(item => {
    const title = item.querySelector('title') ? item.querySelector('title').textContent.trim() : '(geen titel)';
    let link = '';
    const linkEl = item.querySelector('link');
    if (linkEl) {
      link = linkEl.textContent.trim() || linkEl.getAttribute('href') || '';
    }
    if (!link) {
      const guidEl = item.querySelector('guid');
      if (guidEl) link = guidEl.textContent.trim();
    }
    return { title, link };
  });
}

function addFeed() {
  const nameEl = document.getElementById('rss-name');
  const urlEl  = document.getElementById('rss-url');
  const name = nameEl.value.trim();
  const url  = urlEl.value.trim();
  if (!name || !url) return;

  const feeds = getFeeds();
  feeds.push({ name, url });
  saveFeeds(feeds);
  nameEl.value = '';
  urlEl.value = '';
  loadCarousel();
}

function deleteFeed(idx) {
  const feeds = getFeeds();
  feeds.splice(idx, 1);
  saveFeeds(feeds);
  loadCarousel();
}

// ══════════════════════════════════════════════════════
//  SUBREDDITS
// ══════════════════════════════════════════════════════
function getSubreddits() {
  return lsGet('dmdf-subreddits', []);
}

function saveSubreddits(subs) {
  lsSet('dmdf-subreddits', subs);
}

async function fetchSubreddit(sub) {
  const url = `https://www.reddit.com/r/${sub}/hot.json?limit=5`;
  const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
  const data = await resp.json();
  return data.data.children.slice(0, 5).map(c => ({
    title: c.data.title,
    permalink: c.data.permalink
  }));
}

function addSubreddit() {
  const subEl = document.getElementById('reddit-sub');
  const sub = subEl.value.trim().replace(/^r\//i, '');
  if (!sub) return;
  const subs = getSubreddits();
  subs.push(sub);
  saveSubreddits(subs);
  subEl.value = '';
  loadCarousel();
}

function deleteSubreddit(idx) {
  const subs = getSubreddits();
  subs.splice(idx, 1);
  saveSubreddits(subs);
  loadCarousel();
}

// ══════════════════════════════════════════════════════
//  CAROUSEL
// ══════════════════════════════════════════════════════
const ITEMS_PER_PAGE = 4;
let carouselPages = [];
let carouselCurrent = 0;

async function loadCarousel() {
  const track = document.getElementById('carousel-track');
  track.style.transition = 'none';
  track.innerHTML = '<div style="padding:14px 0;color:var(--text-dim);font-size:14px;">Laden…</div>';

  const feeds = getFeeds();
  const subs  = getSubreddits();
  const allItems = [];

  await Promise.allSettled([
    ...feeds.map(async (feed, fi) => {
      try {
        const items = await fetchFeed(feed);
        items.forEach(item => allItems.push({
          source: feed.name,
          title: item.title,
          url: item.link || '#',
          feedIdx: fi,
          type: 'rss'
        }));
      } catch(e) {}
    }),
    ...subs.map(async (sub, si) => {
      try {
        const posts = await fetchSubreddit(sub);
        posts.forEach(post => allItems.push({
          source: 'r/' + sub,
          title: post.title,
          url: 'https://reddit.com' + post.permalink,
          subIdx: si,
          type: 'reddit'
        }));
      } catch(e) {}
    })
  ]);

  renderCarousel(allItems);
}

function renderCarousel(items) {
  const track = document.getElementById('carousel-track');
  track.style.transition = 'none';
  track.innerHTML = '';
  carouselPages = [];
  carouselCurrent = 0;

  if (items.length === 0) {
    track.innerHTML = '<div style="padding:14px 0;color:var(--text-dim);font-size:14px;">Geen feeds ingesteld — voeg een RSS feed of subreddit toe.</div>';
    document.getElementById('carousel-pos').textContent = '';
    document.getElementById('carousel-prev').disabled = true;
    document.getElementById('carousel-next').disabled = true;
    return;
  }

  for (let i = 0; i < items.length; i += ITEMS_PER_PAGE) {
    carouselPages.push(items.slice(i, i + ITEMS_PER_PAGE));
  }

  const feeds = getFeeds();
  const subs  = getSubreddits();

  carouselPages.forEach(page => {
    const pageEl = document.createElement('div');
    pageEl.className = 'carousel-page';
    page.forEach(item => {
      const card = document.createElement('div');
      card.className = 'carousel-card';

      const src = document.createElement('div');
      src.className = 'carousel-source';
      src.appendChild(document.createTextNode(item.source));

      const del = document.createElement('button');
      del.className = 'feed-delete';
      del.textContent = '✕';
      del.title = item.type === 'rss'
        ? `Verwijder feed "${feeds[item.feedIdx]?.name}"`
        : `Verwijder r/${subs[item.subIdx]}`;
      del.onclick = item.type === 'rss'
        ? () => deleteFeed(item.feedIdx)
        : () => deleteSubreddit(item.subIdx);
      src.appendChild(del);

      const a = document.createElement('a');
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = item.title;

      card.appendChild(src);
      card.appendChild(a);
      pageEl.appendChild(card);
    });
    track.appendChild(pageEl);
  });

  updateCarouselPos();
}

function updateCarouselPos() {
  const track = document.getElementById('carousel-track');
  track.style.transition = 'transform 0.35s ease';
  track.style.transform = `translateX(${-carouselCurrent * 100}%)`;
  const total = carouselPages.length;
  document.getElementById('carousel-pos').textContent = total > 0 ? `${carouselCurrent + 1} / ${total}` : '';
  document.getElementById('carousel-prev').disabled = carouselCurrent === 0;
  document.getElementById('carousel-next').disabled = carouselCurrent >= total - 1;
}

function carouselNav(dir) {
  carouselCurrent = Math.max(0, Math.min(carouselPages.length - 1, carouselCurrent + dir));
  updateCarouselPos();
}

// ══════════════════════════════════════════════════════
//  OPML IMPORT
// ══════════════════════════════════════════════════════
function importOpml(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(e.target.result, 'text/xml');
    const outlines = Array.from(xml.querySelectorAll('outline[xmlUrl]'));
    if (outlines.length === 0) {
      alert('Geen RSS feeds gevonden in dit OPML bestand.');
      return;
    }
    const feeds = getFeeds();
    let added = 0;
    outlines.forEach(o => {
      const url = o.getAttribute('xmlUrl');
      const name = o.getAttribute('title') || o.getAttribute('text') || url;
      if (url && !feeds.find(f => f.url === url)) {
        feeds.push({ name, url });
        added++;
      }
    });
    saveFeeds(feeds);
    loadCarousel();
    event.target.value = '';
    if (added > 0) alert(`${added} feed(s) toegevoegd.`);
  };
  reader.readAsText(file);
}
