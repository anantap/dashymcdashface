<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashy McDashface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #16140f;
  --bg2: #1e1b15;
  --surface: #232019;
  --border: #2e2a22;
  --text: #f0ece6;
  --text-muted: #9a9288;
  --text-dim: #5a5650;
  --accent: #e05545;
  --mono: 'DM Mono', monospace;
  --r: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-muted);
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 680px;
  padding: 48px 24px;
  text-align: center;
}

.greeting {
  font-size: 32px;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

.line {
  margin-bottom: 6px;
}

.hi {
  color: var(--text);
}

.prompt {
  margin-top: 40px;
  margin-bottom: 20px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.action-btn {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 18px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.15s, border-color 0.15s;
}
.action-btn:hover {
  color: var(--text);
  border-color: var(--text-muted);
}

.skel {
  display: inline-block;
  width: 80px;
  height: 13px;
  background: linear-gradient(90deg, var(--border) 25%, var(--bg2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 3px;
  vertical-align: middle;
}

@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }

@media (max-width: 480px) {
  .greeting { font-size: 24px; }
  .page { padding: 32px 20px; }
  .actions { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page fade-in">
  <div class="greeting" id="greeting"></div>
  <div class="line" id="line-datetime"></div>
  <div class="line" id="line-jona"></div>
  <div class="line" id="line-weather"></div>
  <div class="prompt">What would you like to do?</div>
  <div class="actions" id="actions"></div>
</div>

<script>
'use strict';

const WMO = {
  0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',
  45:'foggy',48:'foggy',51:'light drizzle',53:'drizzle',55:'heavy drizzle',
  61:'light rain',63:'rain',65:'heavy rain',71:'light snow',73:'snow',
  80:'rain showers',81:'showers',95:'thunderstorms'
};

const SCHEDULE = {
  0:'Weekend', 1:'Papadag', 2:'Opa & Omadag', 3:'Mamadag', 4:'Crèche', 5:'Crèche', 6:'Weekend'
};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function hi(t) { return `<span class="hi">${t}</span>`; }

function greeting(h) {
  if (h >= 5 && h < 12) return 'Good morning!';
  if (h >= 12 && h < 18) return 'Good afternoon!';
  if (h >= 18 && h < 22) return 'Good evening!';
  return 'Good night.';
}

function tick() {
  const now = new Date();
  const h = now.getHours();
  const time = `${String(h).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const dateStr = `${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('greeting').textContent = greeting(h);
  document.getElementById('line-datetime').innerHTML = `It's ${hi(dateStr)} — ${hi(time)}.`;
}

function loadJona() {
  const activity = SCHEDULE[new Date().getDay()];
  document.getElementById('line-jona').innerHTML = `Today is Jona's ${hi(activity)}.`;
}

async function loadWeather() {
  const el = document.getElementById('line-weather');
  el.innerHTML = `Outside: <span class="skel"></span>`;
  try {
    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=52.0705&longitude=4.3007' +
      '&current=temperature_2m,weathercode' +
      '&forecast_days=1&timezone=Europe/Amsterdam'
    );
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const cond = WMO[d.current.weathercode] || '';
    el.innerHTML = `Outside: ${hi(temp + '°C')}, ${hi(cond)}.`;
  } catch {
    el.innerHTML = `Outside: weather unavailable.`;
  }
}

function buildActions() {
  const container = document.getElementById('actions');
  const actions = [
    { label: 'Check e-mail', href: 'https://mail.google.com' },
    { label: 'Look something up', href: 'https://scan-workflow.vercel.app' },
    { label: 'Watch YouTube', href: 'https://youtube.com' },
    { label: 'Think before you buy', href: 'https://mindful-cart.vercel.app' },
  ];
  actions.forEach(a => {
    const link = document.createElement('a');
    link.className = 'action-btn';
    link.href = a.href;
    link.textContent = a.label;
    container.appendChild(link);
  });
}

window.addEventListener('load', () => {
  tick();
  setInterval(tick, 1000);
  loadJona();
  loadWeather();
  buildActions();
});
</script>
</body>
</html>
