<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashy McDashface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #16140f;
  --bg2: #1e1b15;
  --surface: #232019;
  --border: #2e2a22;
  --text: #f0ece6;
  --text-muted: #9a9288;
  --text-dim: #5a5650;
  --accent: #e05545;
  --mono: 'DM Mono', monospace;
  --r: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1.55;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── LAYOUT ── */
.page { position: relative; z-index: 1; width: 100%; max-width: 1280px; padding: 32px 24px; }

/* ── MASTHEAD ── */
.masthead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0 12px;
  border-bottom: 2px solid var(--text);
  margin-bottom: 20px;
}

.masthead-date {
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.clock {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}

/* ── ADDRESS BAR ── */
.address-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.address-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.address-input:focus { border-color: var(--text-muted); }
.address-input::placeholder { color: var(--text-dim); }

.btn-small {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 8px;
  cursor: pointer;
  border-radius: var(--r);
  transition: all 0.15s;
}
.btn-small:hover { border-color: var(--text); color: var(--text); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: stretch;
}

.col-right {
  display: flex;
  flex-direction: column;
}

.col-right .section {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.col-right .weather-block {
  flex: 1;
}

/* ── SECTION ── */
.section { margin-bottom: 20px; }

.section-head {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* ── WEATHER ── */
.weather-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 14px 0;
  display: flex;
  flex-direction: column;
}
.weather-block-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 14px;
}
.weather-block-temp {
  font-family: var(--mono);
  font-size: 25px;
  font-weight: 400;
  color: var(--text);
  line-height: 1;
}
.weather-block-condition {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--text-muted);
}
#weather-detail {
  display: flex;
  flex-direction: column;
  flex: 1;
}
.weather-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex: 1;
  border-top: 1px solid var(--border);
  padding: 10px 0;
}
.weather-row-label { font-size: 15px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.weather-row-val { font-family: var(--mono); font-size: 15px; font-weight: 400; text-align: right; }

/* ── SKELETON ── */
.skel {
  background: linear-gradient(90deg, var(--border) 25%, var(--bg2) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 3px;
  height: 11px;
  margin: 7px 0;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── ANIMATIONS ── */
.fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }

.section { animation: fadeIn 0.5s ease forwards; opacity: 0; }
.section:nth-child(1) { animation-delay: 0.05s; }
.section:nth-child(2) { animation-delay: 0.1s; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .page { padding: 0 16px 32px; }
  .masthead { padding: 14px 0 10px; }
  .clock { font-size: 25px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page">

  <!-- MASTHEAD -->
  <div class="masthead fade-in">
    <div class="masthead-date" id="date-str"></div>
    <div class="clock" id="clock"></div>
  </div>

  <!-- ADDRESS BAR -->
  <div class="address-bar">
    <input class="address-input" id="address-input" type="text" placeholder="Typ een adres…" onkeydown="if(event.key==='Enter') navigate()">
    <button class="btn-small" onclick="navigate()">Go!</button>
  </div>

  <div class="grid">

    <!-- LEFT COL: Jona -->
    <div>
      <div class="section">
        <div class="section-head">Jona</div>
        <div id="jona-schedule" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 12px;">
          <div style="font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;">Vandaag</div>
          <div style="font-family: var(--mono); font-size: 25px; font-weight: 400; color: var(--text);">—</div>
        </div>
      </div>
    </div>

    <!-- RIGHT COL: Weather -->
    <div class="col-right">
      <div class="section">
        <div class="section-head">Weer</div>
        <div class="weather-block">
          <div class="weather-block-header">
            <span class="weather-block-temp" id="weather-temp-block">—</span>
            <span class="weather-block-condition"> — </span>
            <span class="weather-block-condition" id="weather-condition"></span>
          </div>
          <div id="weather-detail"><div class="skel"></div><div class="skel" style="width:70%"></div></div>
        </div>
      </div>
    </div>

  </div><!-- /grid -->

</div><!-- /page -->

<script>
// ══════════════════════════════════════════════════════
//  ADDRESS BAR
// ══════════════════════════════════════════════════════
function navigate() {
  let url = document.getElementById('address-input').value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  window.location.href = url;
}

// ══════════════════════════════════════════════════════
//  CLOCK & DATE
// ══════════════════════════════════════════════════════
function startClock() {
  const days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('nl', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('date-str').textContent =
      `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════════════════
//  WEATHER — Open-Meteo (no API key)
// ══════════════════════════════════════════════════════
const WMO_CODES = {
  0:'Helder',1:'Overwegend helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',
  45:'Mist',48:'Rijpmist',51:'Lichte motregen',53:'Motregen',55:'Zware motregen',
  61:'Lichte regen',63:'Regen',65:'Zware regen',71:'Lichte sneeuw',73:'Sneeuw',80:'Regenbuien',81:'Buien',95:'Onweer'
};

async function loadWeather() {
  try {
    const resp = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.0705&longitude=4.3007&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=temperature_2m,precipitation_probability&forecast_days=1&timezone=Europe/Amsterdam');
    const d = await resp.json();
    const c = d.current;
    const code = c.weathercode;

    document.getElementById('weather-temp-block').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-condition').textContent = WMO_CODES[code] || '';

    const maxTemp = Math.max(...d.hourly.temperature_2m.slice(0,24));
    const minTemp = Math.min(...d.hourly.temperature_2m.slice(0,24));
    const maxRain = Math.max(...d.hourly.precipitation_probability.slice(0,24));

    document.getElementById('weather-detail').innerHTML = `
      <div class="weather-row"><span class="weather-row-label">Min / Max</span><span class="weather-row-val">${Math.round(minTemp)}° / ${Math.round(maxTemp)}°</span></div>
      <div class="weather-row"><span class="weather-row-label">Wind</span><span class="weather-row-val">${Math.round(c.windspeed_10m)} km/u</span></div>
      <div class="weather-row"><span class="weather-row-label">Luchtvochtigheid</span><span class="weather-row-val">${c.relativehumidity_2m}%</span></div>
      <div class="weather-row"><span class="weather-row-label">Kans op regen</span><span class="weather-row-val">${maxRain}%</span></div>
    `;
  } catch(e) {
    document.getElementById('weather-detail').innerHTML = '<div style="font-size:14px;color:var(--text-dim);padding:10px 0">Weer niet beschikbaar</div>';
  }
}

// ══════════════════════════════════════════════════════
//  JONA SCHEDULE
// ══════════════════════════════════════════════════════
function loadJonaSchedule() {
  const schedule = {
    0: 'Papadag',
    1: 'Papadag',
    2: 'Opa & Omadag',
    3: 'Mamadag',
    4: 'Crèche',
    5: 'Crèche',
    6: 'Papadag'
  };
  const today = new Date().getDay();
  const location = schedule[today] || '—';
  const el = document.getElementById('jona-schedule');
  el.innerHTML = `
    <div style="font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;">Vandaag</div>
    <div style="font-family: var(--mono); font-size: 25px; font-weight: 400; color: var(--text);">${location}</div>
  `;
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  startClock();
  loadWeather();
  loadJonaSchedule();
  document.getElementById('address-input').focus();
});
</script>
</body>
</html>
